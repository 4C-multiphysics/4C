TITLE:
  - "1 terminal unit with linear Kelvin-Voigt material and pressure bc"
PROBLEM TYPE:
  PROBLEMTYPE: "Reduced_Lung"
REDUCED DIMENSIONAL LUNG:
  AIR_PROPERTIES:
    DENSITY: 1.176e-06
    DYNAMIC_VISCOSITY: 1.79105e-05
  DYNAMICS:
    DYNAMIC_TYPE: BackwardEuler
    LINEAR_SOLVER: 1
    NUM_STEP: 1
    RESTART_EVERY: 1
    RESULTS_EVERY: 1
    TIMESTEP: 1
  LUNG_TREE:
    ELEMENT_TYPE:
      constant: TerminalUnit
    GENERATION:
      constant: -1
    AIRWAYS: # These values won't be used since there are no airways in the model
      AIRWAY_MODEL:
        constant: Resistive
      RESISTIVE:
        GAMMA:
          constant: 1.0
      RADIUS:
        constant: 1.0
    TERMINAL_UNITS:
      RHEOLOGICAL_MODEL:
        RHEOLOGICAL_MODEL_TYPE:
          constant: KelvinVoigt
        KELVIN_VOIGT:
          ETA:
            constant: 0.0
      ELASTICITY_MODEL:
        ELASTICITY_MODEL_TYPE:
          constant: Linear
        LINEAR:
          ELASTICITY:
            constant: 1.0
SOLVER 1:
  SOLVER: "UMFPACK"
  NAME: "Reduced_dimensional_Airways_Solver"
DESIGN NODE Reduced D AIRWAYS PRESCRIBED CONDITIONS:
  - E: 1
    boundarycond: "pressure"
    VAL: [1]
    curve: [1, null]
  - E: 2
    boundarycond: "pressure"
    VAL: [1]
    curve: [2, null]
DESIGN LINE REDUCED D AIRWAYS EVALUATE LUNG VOLUME CONDITIONS:
  - E: 1
FUNCT1:
  - SYMBOLIC_FUNCTION_OF_TIME: "t"
FUNCT2:
  - SYMBOLIC_FUNCTION_OF_TIME: "0"
MATERIALS:
  - MAT: 1
    MAT_0D_MAXWELL_ACINUS_NEOHOOKEAN:
      Stiffness1: 1
      Stiffness2: 0
      Viscosity1: 1
      Viscosity2: 0
DNODE-NODE TOPOLOGY:
  - "NODE 1 DNODE 1"
  - "NODE 2 DNODE 2"
DLINE-NODE TOPOLOGY:
  - "NODE 1 DLINE 1"
  - "NODE 2 DLINE 1"
REDUCED D AIRWAYS ELEMENTS:
  - "1 RED_ACINUS LINE2 1 2 MAT 1 TYPE NeoHookean AcinusVolume 10 AlveolarDuctVolume 0.0372"
NODE COORDS:
  - "NODE 1 COORD 0 0 0"
  - "NODE 2 COORD 1 0 0"
